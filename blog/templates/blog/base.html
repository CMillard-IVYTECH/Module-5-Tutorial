{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Django Girls Blog</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Lobster">

    <link rel="stylesheet" href="{% static 'css/blog.css' %}">
</head>

<body>

<header class="page-header">
    <div class="container">

        {% if user.is_authenticated %}
            <a href="{% url 'post_new' %}" class="btn btn-light btn-sm me-2">New Post</a>

            <p class="top-menu">
                Hello {{ user.username }}
                <small>
                    <form method="post" action="{% url 'logout' %}" style="display:inline;">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-light btn-sm">Log Out</button>
                    </form>
                </small>
            </p>

        {% else %}
            <a href="{% url 'login' %}" class="btn btn-light btn-sm me-2">Login</a>
            <a href="{% url 'signup' %}" class="btn btn-light btn-sm">Sign Up</a>
        {% endif %}

        <h1><a href="/">SDEV 220 Tutorial Blog</a></h1>
    </div>
</header>

<main class="container">
    <div class="row">
        <div class="col">
            {% block content %}
            {% endblock %}
        </div>
    </div>
</main>

</body>
</html>
